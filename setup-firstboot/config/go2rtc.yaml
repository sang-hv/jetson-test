streams:
  # camera-stream.service → tcpserversink :8553
  # Use exec:bash wrapper instead of tcp:// to avoid go2rtc 1.9.14 panic
  # on MPEG-TS SPS/PPS parse. bash cat reads from byte 0 → SPS/PPS always present.
  camera:
    - exec:bash -c "cat < /dev/tcp/localhost/8553"

api:
  listen: ":1984"
  origin: "*"

log:
  level: info
