# Network Mode Configuration for Jetson Nano
# Managed by: /opt/4g/network-watchdog.sh
# Updated by: sync-config.py (from backend API)
#
# NETWORK_MODE values:
#   auto  = LAN primary → WiFi fallback → 4G last resort
#   wifi  = WiFi primary → 4G fallback
#   lan   = LAN primary → 4G fallback
#   4g    = 4G only (no fallback to WiFi/LAN)
NETWORK_MODE=auto

# APN of SIM card — change to match your carrier:
#   internet         (generic)
#   m-guardee.com    (IIJmio Japan)
#   lte-d.ocn.ne.jp  (NTT OCN Japan)
#   plus.4g          (SoftBank)
#   iijmio.jp        (IIJmio)
APN=internet

# IP address to ping for connectivity check
PING_HOST=8.8.8.8

# Number of consecutive ping failures before remediation
MAX_RETRIES=3

# Watchdog check interval (seconds)
CHECK_INTERVAL=30
