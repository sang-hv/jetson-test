# go2rtc + Backchannel + Person count WS via Nginx
#
# Routes:
# - /api/*         → go2rtc (MSE streaming, WebRTC)
# - /backchannel   → Audio backchannel server
# - /detection/*   → Saved detection images (must match DETECTION_IMAGE_DIR on disk, e.g. /detection/)
# - /detections    → Person count WebSocket (ZMQ bridge)
# - /person-count/ → Static demo page for person count
#
# Auth: every protected route validates ?token= via stream-auth (port 8091).

upstream go2rtc {
    server 127.0.0.1:1984;
}

upstream backchannel {
    server 127.0.0.1:8080;
}

upstream person_count_ws {
    server 127.0.0.1:8090;
}

upstream stream_auth {
    server 127.0.0.1:8091;
}

server {
    listen 80;
    server_name localhost;

    # Increase timeouts for WebSocket
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # -----------------------------------------------------------------------
    # Internal auth subrequest endpoint
    # Nginx calls this before forwarding any protected request.
    # The original URI (with ?token=...) is passed via X-Original-URI.
    # -----------------------------------------------------------------------
    location = /auth {
        internal;
        proxy_pass http://stream_auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # -----------------------------------------------------------------------
    # go2rtc API and streaming
    # -----------------------------------------------------------------------
    location /api/ {
        auth_request /auth;
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;

        proxy_pass http://go2rtc;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Audio backchannel WebSocket
    # -----------------------------------------------------------------------
    location /backchannel {
        auth_request /auth;
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;

        proxy_pass http://backchannel;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Detection images (e.g. /detection/zone_entry/2026-03-26/*.webp)
    # path must match ai_core DETECTION_IMAGE_DIR
    # -----------------------------------------------------------------------
    location /detection/ {
        auth_request /auth;
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;

        alias /detection/;
        autoindex off;
    }

    # -----------------------------------------------------------------------
    # Person count WebSocket (detections)
    # -----------------------------------------------------------------------
    location /detections {
        auth_request /auth;
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;

        proxy_pass http://person_count_ws;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Person count demo (same layout as /opt/backchannel static)
    location /person-count/ {
        alias /opt/person_count_ws/;
    }

    # -----------------------------------------------------------------------
    # Auth error responses
    # -----------------------------------------------------------------------
    location @unauthorized {
        default_type application/json;
        return 401 '{"error":"unauthorized","message":"Missing or invalid token"}';
    }

    location @forbidden {
        default_type application/json;
        return 403 '{"error":"forbidden","message":"Token camera_id does not match this device"}';
    }
}
