# go2rtc + Backchannel via Nginx
#
# Routes:
# - /api/*        → go2rtc (MSE streaming, WebRTC)
# - /backchannel  → Audio backchannel server
#

upstream go2rtc {
    server 127.0.0.1:1984;
}

upstream backchannel {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name localhost;

    # Increase timeouts for WebSocket
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # go2rtc API and streaming
    location /api/ {
        proxy_pass http://go2rtc;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audio backchannel WebSocket
    location /backchannel {
        proxy_pass http://backchannel;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files
    location / {
        root /opt/backchannel;
        index demo.html;
        try_files $uri $uri/ /demo.html;
    }
}
