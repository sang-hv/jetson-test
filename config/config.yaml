# Mini PC Configuration

# Application
app:
  name: "Mini PC Edge AI"
  version: "0.1.0"
  debug: false
  log_level: "INFO"

# Device
device:
  id: "${DEVICE_ID}"
  type: "jetson_nano"
  location: ""

# Cameras
cameras:
  - id: "cam_01"
    name: "Main Camera"
    type: "rtsp"  # rtsp, usb, csi
    rtsp_url: "rtsp://192.168.1.100:554/stream1"
    usb_device: 0
    width: 1280
    height: 720
    fps: 15
    enabled: true

# AI Core
ai:
  # Detection
  detection:
    model: "yolov11s"
    confidence: 0.5
    nms_threshold: 0.45
    use_tensorrt: true
    fp16: true
  
  # Face Recognition
  face:
    detection_model: "scrfd_2.5g"
    recognition_model: "arcface_mobilefacenet"
    confidence: 0.6
    recognition_threshold: 0.6
  
  # Tracking
  tracking:
    algorithm: "deepsort"  # deepsort, bytetrack
    max_age: 30
    min_hits: 3

# Features
features:
  home_monitoring:
    enabled: true
    notify_arrival: true
  
  counting:
    enabled: true
    reset_time: "00:00"
  
  stranger_alert:
    enabled: true
    confidence_threshold: 0.7
  
  animal_detection:
    enabled: false
    classes: ["dog", "cat", "bear"]
  
  ppe_detection:
    helmet: false
    mask: false
    gloves: false
  
  demographics:
    enabled: false
    store_images: false

# Backend
backend:
  api_url: "${BACKEND_API_URL}"
  ws_url: "${BACKEND_WS_URL}"
  api_key: "${BACKEND_API_KEY}"
  timeout: 30
  retry_count: 3
  heartbeat_interval: 30

# Storage
storage:
  data_dir: "/data"
  max_storage_gb: 32
  cleanup_threshold_percent: 80
  snapshot_retention_days: 7
  clip_retention_days: 3

# Scheduler
scheduler:
  default_mode: "home"
  auto_switch: false

# Security
security:
  ssl_verify: true
  encrypt_data: true

# System
system:
  debug_port: 8080
  metrics_interval: 60
  log_rotation_days: 7
